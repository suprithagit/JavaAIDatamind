spring.application.name=datamindAi

server.port=8080
app.title=DataMind AI Backend
app.environment=local
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.ai-model=${spring.ai.ollama.chat.options.model}
app.ai-temperature=${spring.ai.ollama.chat.options.temperature}

spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration

spring.ai.google.genai.api-key.enable=true
spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY:}
spring.ai.google.genai.chat.enabled=false
spring.ai.google.genai.chat.options.model=${GOOGLE_GENAI_MODEL:gemini-2.0-flash}
spring.ai.google.genai.chat.options.temperature=${GOOGLE_GENAI_TEMPERATURE:0.7}

spring.ai.ollama.chat.enabled=true
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:llama3}
spring.ai.ollama.chat.options.temperature=${OLLAMA_TEMPERATURE:0.7}

app.max-queries-per-hour=50

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# DATABASE CONNECTION
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.roctctwijgynvkvxnufo
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.show-sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.keepaliveTime=30000
